services:
  backend:
    build: ./backend
    ports: ["8080:8080"]
    volumes:
      - ./data:/app/data
      - ./models:/app/models
    env_file: .env
    restart: unless-stopped

  frontend:
    build: ./frontend
    ports: ["3000:3000"]
    depends_on: [backend]
    environment:
      - NEXT_PUBLIC_API_URL=http://backend:8080
    restart: unless-stopped
